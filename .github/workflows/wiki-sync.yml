name: Wiki Sync
on:
  push:
    branches: [ main ]
    paths: [ 'design/**', 'README.md' ]

jobs:
  contrib-readme-job:
    runs-on: ubuntu-latest
    name: Update README.md Contributors
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Contribute List
        uses: akhilmhdh/contributors-readme-action@v2.3.11
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wiki-sync-job:
    runs-on: ubuntu-latest
    name: Sync Design Docs to Wiki
    needs: contrib-readme-job
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch full history for accurate link updates

      - name: Flatten and Rename
        run: |
          mkdir -p wiki_staging
          # Renames design/Electronics/Power_Module/Design_Spec.md -> Electronics-Power-Module-Design-Spec.md
          # _Sidebar.md is excluded here; it is auto-generated in the next step.
          find design/ -name "*.md" ! -name "_Sidebar.md" | while read file; do 
            newname=$(echo "$file" | sed "s|design/||; s|/|-|g; s|_|-|g"); 
            cp "$file" "wiki_staging/$newname"; 
          done
          cp README.md wiki_staging/Home.md

      - name: Generate Sidebar
        run: |
          python3 << 'EOF'
          import os

          DESIGN_ROOT = "design"
          WIKI_ROOT   = "wiki_staging"
          EXCLUDE     = {"_Sidebar.md"}

          def path_to_wiki_name(repo_path):
              p = repo_path.replace("\\", "/")
              if p == "README.md":
                  return "Home"
              if p.startswith("design/"):
                  p = p[len("design/"):]
              name = p.replace("/", "-").replace("_", "-")
              if name.endswith(".md"):
                  name = name[:-3]
              return name

          def build_tree(dirpath, repo_dir_path, indent=0):
              """
              Recursively produce sidebar list entries mirroring the directory tree.
              Directories (sections) are listed before files at each level.
              """
              prefix = "  " * indent
              lines  = []
              try:
                  # Files first (sort key 0), then dirs (sort key 1); both alphabetical.
                  entries = sorted(
                      os.scandir(dirpath),
                      key=lambda e: (e.is_dir(), e.name.lower())
                  )
              except PermissionError:
                  return lines

              for entry in entries:
                  if entry.name.startswith("."):
                      continue

                  if entry.is_dir():
                      label = entry.name.replace("_", " ")
                      lines.append(f"{prefix}* **{label}**")
                      sub_repo = f"{repo_dir_path}/{entry.name}"
                      lines.extend(build_tree(entry.path, sub_repo, indent + 1))

                  elif entry.is_file() and entry.name.endswith(".md") and entry.name not in EXCLUDE:
                      label     = entry.name[:-3].replace("_", " ")
                      repo_path = f"{repo_dir_path}/{entry.name}"
                      wiki_name = path_to_wiki_name(repo_path)
                      lines.append(f"{prefix}* [{label}]({wiki_name})")

              return lines

          sidebar = [
              "# Wiki Contents",
              "",
              "* [Home](Home)",
              "",
          ]
          sidebar.extend(build_tree(DESIGN_ROOT, DESIGN_ROOT))
          sidebar += [
              "",
              "---",
              "",
              "* [Browse Source Code](https://github.com/thepinkmile/Enigma-NG)",
              "",
          ]

          out_path = os.path.join(WIKI_ROOT, "_Sidebar.md")
          with open(out_path, "w", encoding="utf-8") as f:
              f.write("\n".join(sidebar))

          print("Generated _Sidebar.md from design/ directory tree.")
          EOF

      - name: Fix Cross-References
        run: |
          python3 << 'EOF'
          import os, re

          DESIGN_ROOT = "design"
          WIKI_ROOT   = "wiki_staging"

          def path_to_wiki_name(repo_path):
              """
              Convert a repo-root-relative path to its flat wiki page name
              (without .md extension), applying the same rules as the bash
              flatten step: strip 'design/' prefix, replace '/' and '_' with '-'.
              """
              p = repo_path.replace("\\", "/")
              if p == "README.md":
                  return "Home"
              if p.startswith("design/"):
                  p = p[len("design/"):]
              name = p.replace("/", "-").replace("_", "-")
              if name.endswith(".md"):
                  name = name[:-3]
              return name

          # Build forward map:  repo-relative path  ->  wiki page name
          path_map = {}
          for dirpath, _, filenames in os.walk(DESIGN_ROOT):
              for fn in filenames:
                  if fn.endswith(".md"):
                      p = os.path.normpath(os.path.join(dirpath, fn)).replace("\\", "/")
                      path_map[p] = path_to_wiki_name(p)
          path_map["README.md"] = "Home"

          # Reverse map: wiki page name  ->  original repo-relative path
          wiki_to_orig = {v: k for k, v in path_map.items()}

          LINK_RE = re.compile(r'\[([^\]]+)\]\(([^)]+)\)')

          def fix_link(m, source_orig_path):
              link_text = m.group(1)
              href      = m.group(2)

              # Leave external URLs and bare fragment anchors unchanged.
              if re.match(r'^(https?|mailto|ftp):', href) or href.startswith('#'):
                  return m.group(0)

              # Separate optional fragment anchor from the path portion.
              fragment = ""
              if "#" in href:
                  href, frag = href.split("#", 1)
                  fragment = "#" + frag
              if not href:
                  return m.group(0)

              # Resolve the relative href against the source file's directory.
              source_dir = os.path.dirname(source_orig_path)
              if source_dir:
                  resolved = os.path.normpath(os.path.join(source_dir, href)).replace("\\", "/")
              else:
                  resolved = os.path.normpath(href).replace("\\", "/")

              # os.path.normpath may return a leading './' on some inputs — strip it.
              if resolved.startswith("./"):
                  resolved = resolved[2:]

              # Ensure the target has a .md extension for the map lookup.
              resolved_md = resolved if resolved.endswith(".md") else resolved + ".md"

              if resolved_md in path_map:
                  wiki_name = path_map[resolved_md]
                  return f"[[{link_text}|{wiki_name}{fragment}]]"

              # Unresolvable (external asset, typo, etc.) — leave unchanged so we
              # don't silently break links we cannot map.
              return m.group(0)

          for wiki_filename in sorted(os.listdir(WIKI_ROOT)):
              if not wiki_filename.endswith(".md"):
                  continue

              # Map the flat wiki filename back to the original repo path.
              wiki_name = wiki_filename[:-3]   # strip .md
              orig_path = wiki_to_orig.get(wiki_name)

              if orig_path is None:
                  # Special files whose flat name differs from the map key.
                  if wiki_filename == "Home.md":
                      orig_path = "README.md"
                  elif wiki_filename == "_Sidebar.md":
                      # Generated file — links are already wiki page names, no path resolution needed.
                      continue
                  else:
                      print(f"Warning: no origin mapping for {wiki_filename} — skipping link fix")
                      continue

              filepath = os.path.join(WIKI_ROOT, wiki_filename)
              with open(filepath, "r", encoding="utf-8") as f:
                  content = f.read()

              new_content = LINK_RE.sub(lambda m: fix_link(m, orig_path), content)

              if new_content != content:
                  print(f"  Updated links: {wiki_filename}")

              with open(filepath, "w", encoding="utf-8") as f:
                  f.write(new_content)

          print("Cross-reference fix complete.")
          EOF

      - name: Sync to Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          token: ${{ secrets.WIKI_SYNC_TOKEN }}
          path: wiki_staging/
          strategy: init # This clears the wiki and force-pushes the new "flattened" structure
          preprocess: false # We handled this manually in the script for better control
          commit_message: "Auto-sync Wiki from design docs (flattened structure)"